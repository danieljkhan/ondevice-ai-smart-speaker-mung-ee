[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "ai_models",
  "artifacts",
  "Design",
  "PPT",
  "Dev_Plan",
  "scripts/_analyze_rag.py",
  "scripts/_parse_e2e.py",
  "scripts/augment_bad_labels.py",
  "scripts/generate_quantization_report.py",
  "scripts/merge_and_label_ft_data.py",
  "scripts/mungi_qlora_finetune_v3.py",
  "scripts/generate_e2e_v2_batch_input.py",
  "scripts/*.ipynb",
  "scripts/colab/*.ipynb",
  "scripts/finetune/upstream/",
  ".codex_tmp",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
  "UP031",  # printf-string-formatting — bulk scripts use % format
  "E501",   # line-too-long — addressed incrementally
  "E741",   # ambiguous-variable-name — l/O in math contexts
  "E402",   # module-import-not-at-top — conditional imports in scripts
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_optional = true
pretty = true
exclude = "(^\\.git/|^\\.venv/|^__pycache__/|^ai_models/|^artifacts/|^Design/|^PPT/|^Dev_Plan/|^scripts/_|scripts/augment_|scripts/generate_e2e_v2|scripts/generate_quantization|scripts/merge_and_label|scripts/mungi_qlora|scripts/Mungi_QLoRA_Qwen35|scripts/finetune/upstream/|\\.codex_tmp/)"

[[tool.mypy.overrides]]
module = [
    "torch",
    "torch.*",
    "onnxruntime",
    "onnxruntime.*",
    "sherpa_onnx",
    "sherpa_onnx.*",
    "llama_cpp",
    "llama_cpp.*",
    "numpy",
    "numpy.*",
    "openwakeword",
    "openwakeword.*",
    "sounddevice",
    "sounddevice.*",
    "supertonic",
    "supertonic.*",
    "pyarrow",
    "pyarrow.*",
    "anthropic",
    "anthropic.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra --cov --cov-report=term-missing:skip-covered"
markers = [
    "safety_qa: regression suite for safety filters and approved-template router",
]

[tool.coverage.run]
source = ["core", "models", "safety", "hardware", "parental"]
omit = ["tests/*", "scripts/*", "docs/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
fail_under = 70
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.",
  "if TYPE_CHECKING:",
]
