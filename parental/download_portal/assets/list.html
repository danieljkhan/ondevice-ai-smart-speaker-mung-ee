<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="same-origin">
  <title>대화 세션 목록</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <h1>대화 세션 목록</h1>
    <p class="sub">{session_count}개 세션. 다운로드할 세션을 선택하세요.</p>
    <form method="post" action="/download" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{csrf_token}">
      <div class="toolbar">
        <label><input type="checkbox" id="select-all"> 전체 선택</label>
        <button type="submit">선택 항목 ZIP 다운로드</button>
      </div>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>세션</th>
            <th>대화 수</th>
            <th>오디오 수</th>
            <th>크기</th>
            <th>다운로드</th>
          </tr>
        </thead>
        <tbody>
          {rows}
        </tbody>
      </table>
    </form>
    <form method="post" action="/shutdown" autocomplete="off" class="shutdown-form"
          onsubmit="return confirm('다운로드 포털 서버를 종료할까요?\n메모리가 확보됩니다. 다시 켜려면 젯슨에서 재시작하거나 재부팅해야 합니다.');">
      <input type="hidden" name="csrf_token" value="{csrf_token}">
      <button type="submit" class="danger">포털 종료 (메모리 확보)</button>
    </form>
  </main>
  <script>
    // No framework — one tiny vanilla helper for the select-all checkbox.
    document.getElementById("select-all").addEventListener("change", function (e) {
      document.querySelectorAll("input[name=session_id]").forEach(function (cb) {
        cb.checked = e.target.checked;
      });
    });
  </script>
</body>
</html>
