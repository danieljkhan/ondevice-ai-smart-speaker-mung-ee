name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy core/ models/ safety/ hardware/ scripts/ parental/

      - name: Pytest with coverage
        run: pytest tests/ -v --cov --cov-report=term-missing:skip-covered
