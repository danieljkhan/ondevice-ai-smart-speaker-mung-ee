# Mungi kiosk Weston config. Disables the desktop-shell screen lock so idle
# screen-off does not present an "unlock your device" prompt on the child-facing
# touchscreen. Idle timeout is set via --idle-time (env MUNGI_SCREEN_IDLE_S) in
# scripts/mungi-kiosk-start.sh. No [output] block - keep DP-1 auto-detection.
[shell]
locking=false
